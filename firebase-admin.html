<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Admin</title>
    <meta http-equiv="refresh" content="0; url=admin/">
    <link rel="canonical" href="admin/">
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 3rem; color: #333; }
        a { color: #059669; font-weight: 600; }
    </style>
</head>
<body>
    <p>The admin dashboard has moved to <a href="admin/">/admin/</a>.</p>
    <script>
        var q = window.location.search || '';
        var h = window.location.hash || '';
        window.location.replace('admin/' + q + h);
    </script>
</body>
</html>
